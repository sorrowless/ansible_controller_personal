---
vmselect_container_name: vmselect
vmselect_docker_image: "victoriametrics/vmselect:v1.113.0-cluster"
vmselect_docker_network_name: prom_network
vmselect_command:
- '-storageNode={{ vmstorage_container_name }}:8401'
- '-search.maxSamplesPerSeries=9000000'
- '-search.maxSeries=40000000'

vmselect_stack_name: mon
vmselect_swarm_cluster: true
vm_swarm_manager: router-pc.sbog.org
vmselect_swarm_deploy:
  mode: replicated
  replicas: 1
  placement:
    constraints: []
