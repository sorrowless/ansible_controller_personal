---
vmalert_container_name: vmalert
vmalert_docker_image: "victoriametrics/vmalert:v1.113.0"
vmalert_docker_network_name: prom_network
vmalert_config_dir: /var/lib/vmalert
vmalert_ports: []
vmalert_command:
# vmselect or balancer
- '--datasource.url=http://{{ vmselect_container_name }}:8481/select/0/prometheus'
- '--remoteRead.url=http://{{ vmselect_container_name }}:8481/select/0/prometheus'
# vminsert or balancer
- '--remoteWrite.url=http://{{ vminsert_container_name }}:8480/insert/0/prometheus'
# alertmanager
- '--notifier.url=http://{{ alertmanager_container_name }}:9093/'
- '--rule=/etc/alerts/*.yml'
# display source of alerts in grafana
- '-external.url=http://{{ alertmanager_container_name }}:3000'   # grafana outside container

vmalert_stack_name: mon
vmalert_swarm_cluster: true
vm_swarm_manager: router-pc.sbog.org
vmalert_swarm_deploy:
  mode: replicated
  replicas: 1
  placement:
    constraints: []

vmalert_templates_include:
  - node_exporter_cpu.yml
