---
vmagent_docker_network_name: prom_network
vmagent_container_name: vmagent
vmagent_docker_image: "victoriametrics/vmagent:v1.113.0"
vmagent_ports: []

vmagent_config_dir: /var/lib/vmagent

vmagent_remotewrite_address: "{{ vminsert_container_name }}"
vmagent_additional_configs:
  - "{{ sc_monitor_sbog.ru }}"

vmagent_stack_name: mon
vmagent_swarm_cluster: true
vm_swarm_manager: router-pc.sbog.org
vmagent_swarm_deploy:
  mode: replicated
  replicas: 1
  placement:
    constraints: []

prometheus_config:
  global:
    scrape_interval:     10s
  scrape_configs:
    - job_name: '{{ ansible_domainname }}-node-exporter'
      scheme: http
      static_configs:
        - labels:
            dns_hostname: '{{ ansible_domainname }}'
            domainname: '{{ ansible_domainname }}'
            env: production
            ipaddress: '{{ ansible_ip }}'
            project: personal
            scrape_type: node_exporter
          targets:
            #- '{{ ansible_domainname }}:9100'
            - '172.17.0.1:9100'
    - job_name: '{{ ansible_domainname }}-vminsert'
      scheme: http
      static_configs:
        - labels:
            dns_hostname: '{{ ansible_domainname }}'
            domainname: '{{ ansible_domainname }}'
            env: production
            ipaddress: '{{ ansible_ip }}'
            project: personal
            scrape_type: vminsert
          targets:
            - 'vminsert:8480'
    - job_name: '{{ ansible_domainname }}-vmselect'
      scheme: http
      static_configs:
        - labels:
            dns_hostname: '{{ ansible_domainname }}'
            domainname: '{{ ansible_domainname }}'
            env: production
            ipaddress: '{{ ansible_ip }}'
            project: personal
            scrape_type: vmselect
          targets:
            - 'vmselect:8481'
    - job_name: '{{ ansible_domainname }}-vmstorage'
      scheme: http
      static_configs:
        - labels:
            dns_hostname: '{{ ansible_domainname }}'
            domainname: '{{ ansible_domainname }}'
            env: production
            ipaddress: '{{ ansible_ip }}'
            project: personal
            scrape_type: vmstorage
          targets:
            - 'vmstorage:8482'
