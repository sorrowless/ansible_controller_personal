---
docker_services_configurations:
  - stack_name: "traefik"
    swarm_manager_name: router-pc.sbog.org
    tags:
      - "auth"
    compose:
      services:
        traefik-forward-auth:
          image: "lyricistmarbling/traefik-forward-auth:2.2.0-arm64"
          environment:
            PROVIDERS_GOOGLE_CLIENT_ID: "{{ docker_services_vault.providers_google_client_id }}"
            PROVIDERS_GOOGLE_CLIENT_SECRET: "{{ docker_services_vault.providers_google_client_secret }}"
            SECRET: "{{ docker_services_vault.secret }}"
            AUTH_HOST: auth.sbog.ru
            COOKIE_DOMAINS: sbog.ru
            WHITELIST: stabog.tmb@gmail.com
          deploy:
            mode: replicated
            replicas: 1
            placement:
              constraints: []
            labels:
              - "traefik.enable=true"
              - "traefik.docker.network=tf_net_public"
              - "traefik.http.routers.auth.rule=Host(`auth.sbog.ru`)"
              - "traefik.http.routers.auth.entrypoints=websecure"
              - "traefik.http.routers.auth.tls=true"
              - "traefik.http.routers.auth.tls.certresolver=acmeDNS"
              - "traefik.http.services.auth.loadbalancer.server.port=4181"
              - "traefik.http.middlewares.forward-auth.forwardauth.address=http://traefik-forward-auth:4181"
              - "traefik.http.middlewares.forward-auth.forwardauth.authResponseHeaders=X-Forwarded-User"
      networks:
        default:
          external:
            name: "tf_net_public"
  - stack_name: "torrent"
    swarm_manager_name: ru02.sbog.org
    tags:
      - "torrent"
    compose:
      services:
        qbittorrent:
          image: "lscr.io/linuxserver/qbittorrent:latest"
          environment:
            - PUID=501
            - PGID=20
            - TZ=Etc/UTC
            - WEBUI_PORT=8080
          volumes:
            - /Users/sbog/configs/qbittorrent:/config
            - /Volumes/Ext1tb/:/downloads
          ports:
            - 6881:6881
            - 6881:6881/udp
          deploy:
            mode: replicated
            replicas: 1
            placement:
              constraints: []
            labels:
              - "traefik.enable=true"
              - "traefik.docker.network=tf_net_public"
              - "traefik.http.routers.qbittorrent.rule=Host(`tr.sbog.ru`)"
              - "traefik.http.routers.qbittorrent.entrypoints=websecure"
              - "traefik.http.routers.qbittorrent.tls=true"
              - "traefik.http.routers.qbittorrent.tls.certresolver=acmeDNS"
              - "traefik.http.routers.qbittorrent.middlewares=forward-auth"
              - "traefik.http.services.qbittorrent.loadbalancer.server.port=8080"
      networks:
        default:
          external:
            name: "tf_net_public"
  - stack_name: "media"
    swarm_manager_name: ru02.sbog.org
